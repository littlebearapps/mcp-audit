# Auto-create git tags when version bumps are merged to main
# This triggers the publish.yml workflow automatically
name: Auto Tag on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'

jobs:
  auto-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          # Extract version from current and previous commit
          OLD_VERSION=$(git show HEAD^:pyproject.toml | grep -m1 '^version = ' | cut -d'"' -f2 || echo "")
          NEW_VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)

          echo "old_version=$OLD_VERSION"
          echo "new_version=$NEW_VERSION"

          if [ -z "$OLD_VERSION" ]; then
            echo "No previous version found (new project?)"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          elif [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged: $NEW_VERSION"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag exists
        id: tag_check
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "::notice::Created and pushed tag $TAG"
