# Custom Models
# ============================================================================

[pricing.custom]
# Add your custom models here. Examples:
#
# Local models (no API cost):
# "llama-3-70b" = { input = 0.0, output = 0.0, cache_create = 0.0, cache_read = 0.0 }
#
# Custom API models:
# "my-fine-tuned-gpt4" = { input = 5.0, output = 20.0, cache_read = 2.5 }
