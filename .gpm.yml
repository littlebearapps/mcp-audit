branchProtection:
  enabled: false
  requireReviews: 0
  requireStatusChecks:
    - quality-gate
  enforceAdmins: false
  deleteBranchOnMerge: true
ci:
  waitForChecks: true
  failFast: true
  retryFlaky: false
  timeout: 30
security:
  scanSecrets: true
  scanDependencies: true
  allowedVulnerabilities: []
pr:
  templatePath: .github/PULL_REQUEST_TEMPLATE.md
  autoAssign: []
  autoLabel: []
  deleteBranchOnMerge: true
autoFix:
  enabled: true
  maxAttempts: 2
  maxChangedLines: 1000
  requireTests: true
  enableDryRun: false
  autoMerge: false
  createPR: true
hooks:
  prePush:
    enabled: true
    reminder: true
  postCommit:
    enabled: false
    reminder: true
verification:
  detectionEnabled: true
  preferMakefile: true
